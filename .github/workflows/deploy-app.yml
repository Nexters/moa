name: Deploy App

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.5.0 or v0.5.0)'
        required: true
        type: string

jobs:
  notify-release:
    runs-on: ubuntu-latest
    steps:
      - name: Extract changelog
        id: changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RELEASE_BODY: ${{ github.event.release.body }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="${INPUT_VERSION}"
            [[ "$TAG" != v* ]] && TAG="v${TAG}"
            BODY=$(gh release view "$TAG" --repo "$REPO" --json body --jq '.body' 2>/dev/null || true)
          else
            BODY="$RELEASE_BODY"
          fi

          # "What's Changed" 섹션에서 PR 목록 추출
          CHANGES=$(echo "$BODY" | grep '^\* ' | head -20 | sed 's/^\* /• /' | sed 's| by @.* in .*||')

          echo "changes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Discord Notification
        continue-on-error: true
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VERSION: ${{ github.event.release.tag_name || inputs.version }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          CHANGES: ${{ steps.changelog.outputs.changes }}
        run: |
          RELEASE_URL="https://github.com/${REPO}/releases/tag/${VERSION}"
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          PAYLOAD=$(jq -n \
            --arg title "🚀 Moa App ${VERSION} 릴리즈 배포" \
            --argjson color 3447003 \
            --arg version "$VERSION" \
            --arg actor "$ACTOR" \
            --arg release_url "$RELEASE_URL" \
            --arg timestamp "$TIMESTAMP" \
            --arg changes "$CHANGES" \
            '{
              embeds: [{
                title: $title,
                color: $color,
                description: (if $changes != "" then $changes else null end),
                fields: [
                  {name: "버전", value: $version, inline: true},
                  {name: "배포자", value: $actor, inline: true},
                  {name: "릴리스", value: $release_url}
                ],
                timestamp: $timestamp
              }]
            }')

          curl -f -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK"

  update-cask:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Get release info
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            RAW="$INPUT_VERSION"
          else
            RAW="$RELEASE_TAG"
          fi
          VERSION="${RAW#v}"
          TAG="v${VERSION}"

          gh release view "$TAG" --repo "$REPO" > /dev/null
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Download DMGs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          gh release download "$TAG" \
            --repo "$REPO" \
            --pattern "*.dmg" \
            --dir ./dmgs

      - name: Calculate SHA256
        id: sha
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          echo "aarch64=$(shasum -a 256 ./dmgs/moa_${VERSION}_aarch64.dmg | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "x64=$(shasum -a 256 ./dmgs/moa_${VERSION}_x64.dmg | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Checkout Tap repo
        uses: actions/checkout@v4
        with:
          repository: nexters/homebrew-moa
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Generate Cask formula
        env:
          VERSION: ${{ steps.release.outputs.version }}
          SHA_AARCH64: ${{ steps.sha.outputs.aarch64 }}
          SHA_X64: ${{ steps.sha.outputs.x64 }}
        run: |
          mkdir -p homebrew-tap/Casks
          sed -e "s/{{VERSION}}/$VERSION/g" \
              -e "s/{{SHA_AARCH64}}/$SHA_AARCH64/g" \
              -e "s/{{SHA_X64}}/$SHA_X64/g" \
              homebrew/Casks/moa.rb.template \
              > homebrew-tap/Casks/moa.rb

      - name: Push to Tap repo
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/moa.rb
          git commit -m "Update moa to v${{ steps.release.outputs.version }}"
          git push

  notify-homebrew:
    needs: [update-cask]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Discord Notification
        continue-on-error: true
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RESULT: ${{ needs.update-cask.result }}
          VERSION: ${{ github.event.release.tag_name || inputs.version }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$RESULT" == "success" ]; then
            COLOR=5763719
            TITLE="✅ Homebrew Cask ${VERSION} 업데이트 완료"
          else
            COLOR=15548997
            TITLE="❌ Homebrew Cask ${VERSION} 업데이트 실패"
          fi

          RELEASE_URL="https://github.com/${REPO}/releases/tag/${VERSION}"
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --argjson color "$COLOR" \
            --arg version "$VERSION" \
            --arg actor "$ACTOR" \
            --arg release_url "$RELEASE_URL" \
            --arg timestamp "$TIMESTAMP" \
            '{
              embeds: [{
                title: $title,
                color: $color,
                fields: [
                  {name: "버전", value: $version, inline: true},
                  {name: "배포자", value: $actor, inline: true},
                  {name: "릴리스", value: $release_url}
                ],
                timestamp: $timestamp
              }]
            }')

          curl -f -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK"
